<div class="contenedor">

<h2>Calculadora IMC</h2>

<input id="peso" type="number" placeholder="Peso kg"><br><br>

<input id="altura" type="number" placeholder="Altura m"><br><br>

<button onclick="imc()">Calcular</button>

<p id="resultado"></p>

</div>

<script>

function imc(){

let p = parseFloat(document.getElementById("peso").value);
let a = parseFloat(document.getElementById("altura").value);

let r = p / (a*a);

document.getElementById("resultado").innerHTML =
"IMC: "+r.toFixed(2);

}

</script>
