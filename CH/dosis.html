<div class="contenedor">

<h2>Dosis por peso</h2>

<input id="peso" type="number" placeholder="Peso kg"><br><br>

<input id="dosis" type="number" placeholder="mg/kg"><br><br>

<button onclick="calcular()">Calcular</button>

<p id="resultado"></p>

</div>

<script>

function calcular(){

let peso = parseFloat(document.getElementById("peso").value);
let dosis = parseFloat(document.getElementById("dosis").value);

let total = peso * dosis;

document.getElementById("resultado").innerHTML =
"Dosis total: "+total+" mg";

}

</script>
